name: Deploy CV Matcher

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into HTML
        run: |
          sed -i "s|PASTE_YOUR_ANTHROPIC_KEY_HERE|${{ secrets.CLAUDE_KEY }}|g" index.html
          sed -i "s|PASTE_YOUR_GOOGLE_API_KEY_HERE|${{ secrets.GAPI_KEY }}|g" index.html
          sed -i "s|PASTE_YOUR_SHEET_ID_HERE|${{ secrets.SHEET_ID }}|g" index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
