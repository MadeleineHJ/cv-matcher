<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Matcher</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0e;
    --surface: #131316;
    --surface2: #1a1a1f;
    --surface3: #202028;
    --border: #252530;
    --border2: #32323f;
    --text: #dddde8;
    --muted: #686880;
    --faint: #3a3a50;
    --accent: #6e5ff0;
    --accent-light: rgba(110,95,240,0.12);
    --accent-border: rgba(110,95,240,0.3);
    --green: #3dd68c;
    --green-dim: rgba(61,214,140,0.1);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.1);
    --red: #f26d6d;
    --red-dim: rgba(242,109,109,0.1);
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 28px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .wordmark {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .wordmark-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
  }

  .header-sep { flex: 1; }

  .pill {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    color: var(--muted);
    letter-spacing: 0.4px;
  }
  .pill.live {
    border-color: var(--accent-border);
    color: var(--accent);
    background: var(--accent-light);
  }

  .app {
    display: grid;
    grid-template-columns: 360px 1fr;
    flex: 1;
    height: calc(100vh - 52px);
    overflow: hidden;
  }

  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-section.grow {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-bottom: none;
  }

  .field-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }

  .n-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 6px 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .n-btn:hover { border-color: var(--border); color: var(--text); }
  .n-btn.active { background: var(--accent-light); border-color: var(--accent-border); color: var(--accent); }

  .cv-status {
    padding: 8px 12px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 11px;
    background: var(--green-dim);
    color: var(--green);
    display: none;
  }
  .cv-status.visible { display: block; }
  .cv-status.err { background: var(--red-dim); color: var(--red); }

  .jd-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  textarea {
    flex: 1;
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    padding: 0;
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    resize: none;
    overflow-y: auto;
  }
  textarea::placeholder { color: var(--faint); }

  .run-wrap {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .run-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px 20px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .run-btn:hover   { opacity: 0.87; }
  .run-btn:active  { transform: scale(0.98); }
  .run-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.65s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .results-panel { display: flex; flex-direction: column; overflow: hidden; }

  .results-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .results-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .results-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--faint);
    margin-left: auto;
  }

  .results-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }

  .empty {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
  }

  .empty-ring {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px dashed var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    margin-bottom: 6px;
    color: var(--faint);
  }

  .empty p     { font-size: 13px; line-height: 1.6; color: var(--muted); }
  .empty small { font-size: 11px; color: var(--faint); }

  .progress-wrap { display: none; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .progress-wrap.visible { display: flex; }

  .progress-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  .progress-track {
    height: 3px;
    background: var(--surface3);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 10px;
    animation: fadeUp 0.2s ease;
    transition: border-color 0.15s;
  }
  .result-card:hover { border-color: var(--border2); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .rank-num {
    font-family: var(--mono);
    font-size: 11px;
    width: 26px; height: 26px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .r1 { background: rgba(245,166,35,0.12); color: var(--amber); border: 1px solid rgba(245,166,35,0.25); }
  .r2 { background: rgba(180,180,200,0.08); color: #9090b0; border: 1px solid rgba(180,180,200,0.15); }
  .r3 { background: rgba(160,100,60,0.1); color: #b07050; border: 1px solid rgba(160,100,60,0.2); }
  .rn { background: var(--surface2); color: var(--faint); border: 1px solid var(--border); }

  .card-id { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); }

  .card-score-area { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  .score-num {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    min-width: 30px;
    text-align: right;
  }

  .score-bar { width: 72px; height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 2px; }

  .card-reason { font-size: 12px; line-height: 1.65; color: var(--muted); }

  .error-box {
    background: var(--red-dim);
    border: 1px solid rgba(242,109,109,0.25);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--red);
    line-height: 1.6;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="wordmark">
    <div class="wordmark-dot"></div>
    CV Matcher
  </div>
  <div class="header-sep"></div>
  <div class="pill" id="status-pill">idle</div>
</header>

<div class="app">

  <div class="sidebar">

    <!-- CV status (auto-loaded, hidden from user) -->
    <div class="sidebar-section">
      <div class="cv-status" id="cv-status"></div>
    </div>

    <!-- Top N -->
    <div class="sidebar-section">
      <div class="field-label">Return top</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="n-btn active" onclick="setN(this,10)">10</button>
        <button class="n-btn" onclick="setN(this,25)">25</button>
        <button class="n-btn" onclick="setN(this,50)">50</button>
        <button class="n-btn" onclick="setN(this,100)">100</button>
      </div>
    </div>

    <!-- JD -->
    <div class="sidebar-section grow">
      <div class="field-label">Job Description</div>
      <div class="jd-wrap">
        <textarea id="jd-input" placeholder="Paste the job description here...

Claude will read all CVs from the sheet and rank every candidate against this role."></textarea>
      </div>
    </div>

    <div class="run-wrap">
      <button class="run-btn" id="run-btn" onclick="runMatch()">
        <div class="spinner" id="spinner"></div>
        <svg id="run-icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M3 2.5L13 8L3 13.5V2.5Z" fill="currentColor"/>
        </svg>
        Match CVs
      </button>
    </div>

  </div>

  <div class="results-panel">
    <div class="results-header">
      <span class="results-title">Results</span>
      <span class="results-meta" id="results-meta"></span>
    </div>
    <div class="results-scroll" id="results-scroll">

      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-label">
          <span id="progress-label">Loading...</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <div class="empty" id="empty-state">
        <div class="empty-ring">◎</div>
        <p>Paste a job description<br>and click Match CVs.</p>
        <small>Claude reads every CV from the sheet and ranks all candidates.</small>
      </div>

    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// CONFIGURATION
// ─────────────────────────────────────────────
const SHEET_ID    = "1TEsMq5rP_4ODW_I-p97Py5E0antpXy0d-NTv1zQEHHw";
const SHEET_TAB   = "T4J Learners Resumes";
const GAPI_KEY    = "AIzaSyBjl1Xts_3hpiUwfMtmhsqCoXyS4kOD6iY";
// ─────────────────────────────────────────────

let loadedCVs = [];
let topN = 10;
const $ = id => document.getElementById(id);

function setN(btn, n) {
  topN = n;
  document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// Auto-load CVs silently when page opens
window.addEventListener('DOMContentLoaded', loadSheet);

async function loadSheet() {
  const statusEl = $('cv-status');
  statusEl.className   = 'cv-status visible';
  statusEl.textContent = 'Loading CVs from sheet...';

  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${encodeURIComponent(SHEET_ID)}/values/${encodeURIComponent(SHEET_TAB + '!A:B')}?key=${encodeURIComponent(GAPI_KEY)}`;
    const res = await fetch(url);

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'HTTP ' + res.status);
    }

    const data = await res.json();
    const rows = (data.values || []).filter(r => r.length >= 2);

    const firstCell = (rows[0]?.[0] || '').toLowerCase().trim();
    const isHeader  = firstCell === 'id' || firstCell === 'learner_id' || isNaN(firstCell);
    const start     = isHeader ? 1 : 0;

    loadedCVs = rows.slice(start).map(r => ({
      id: String(r[0]).trim(),
      cv: String(r[1]).trim()
    })).filter(r => r.id && r.cv);

    if (loadedCVs.length === 0) throw new Error('No data found. Check sheet tab name and sharing settings.');

    statusEl.textContent = `${loadedCVs.length.toLocaleString()} CVs loaded`;

  } catch (err) {
    statusEl.className   = 'cv-status visible err';
    statusEl.textContent = 'Sheet error: ' + err.message;
  }
}

async function runMatch() {
  const jd = $('jd-input').value.trim();

  if (!jd)               { showError('Paste a job description first.'); return; }
  if (!loadedCVs.length) { showError('CVs not loaded yet. Refresh the page.'); return; }

  setLoading(true);
  $('empty-state').style.display = 'none';
  $('results-meta').textContent  = '';
  $('results-scroll').innerHTML  = '';

  showLiveProgress();

  const cvBlock = loadedCVs.map(c => `ID: ${c.id}\n${c.cv}`).join('\n\n---\n\n');

  const system = `You are an expert recruiter and CV screening specialist.
You will receive a job description and a list of candidate CVs, each prefixed with their ID.

Analyze every candidate against the job requirements, then return ONLY the top ${topN} best matches.
Return ONLY a valid JSON array with no markdown fences and no text outside the JSON.

Format:
[{"id":"1001","score":9,"reason":"Specific reason mentioning real skills, experience, and gaps"},...]

Rules:
- score is 0 to 10 (10 = perfect fit)
- reason must be specific: name actual skills, years of experience, concrete gaps
- return exactly the top ${topN} candidates only, sorted by score descending
- do not include candidates below the top ${topN}`;

  const userMsg = `JOB DESCRIPTION:\n${jd}\n\n===CANDIDATES (${loadedCVs.length} total)===\n\n${cvBlock}`;

  try {
    const response = await fetch('https://cv-proxy.madeleine-hammad.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 8192,
        stream: true,
        system,
        messages: [{ role: 'user', content: userMsg }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API error ' + response.status);
    }

    const reader  = response.body.getReader();
    const decoder = new TextDecoder();
    let fullText  = '';
    let tokenCount = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      for (const line of decoder.decode(value, { stream: true }).split('\n')) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') continue;
        try {
          const p = JSON.parse(raw);
          if (p.type === 'content_block_delta' && p.delta?.text) {
            fullText += p.delta.text;
            tokenCount++;
            updateLiveProgress(tokenCount, fullText);
          }
        } catch {}
      }
    }

    renderResults(fullText);

  } catch (err) {
    showError(err.message);
  } finally {
    setLoading(false);
  }
}

function renderResults(text) {
  $('progress-wrap').classList.remove('visible');
  const scroll = $('results-scroll');

  const match = text.match(/\[[\s\S]*\]/);
  if (!match) {
    scroll.innerHTML = `<pre style="font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.6;white-space:pre-wrap">${esc(text)}</pre>`;
    $('results-meta').textContent = 'raw output';
    return;
  }

  let results;
  try { results = JSON.parse(match[0]); }
  catch { showError('Could not parse response. Try again.'); return; }

  results.sort((a, b) => Number(b.score) - Number(a.score));
  scroll.innerHTML = '';

  results.forEach((r, i) => {
    const score = Math.min(10, Math.max(0, Number(r.score) || 0));
    const pct   = (score / 10) * 100;
    const col   = score >= 8 ? 'var(--green)' : score >= 5 ? 'var(--amber)' : 'var(--red)';
    const rCls  = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : 'rn';

    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="card-header">
        <div class="rank-num ${rCls}">#${i+1}</div>
        <span class="card-id">ID ${esc(String(r.id))}</span>
        <div class="card-score-area">
          <span class="score-num" style="color:${col}">${score}/10</span>
          <div class="score-bar">
            <div class="score-fill" style="width:${pct}%;background:${col}"></div>
          </div>
        </div>
      </div>
      <div class="card-reason">${esc(r.reason || '')}</div>
    `;
    scroll.appendChild(card);
  });

  $('results-meta').textContent = `top ${results.length} of ${loadedCVs.length} candidates`;
}

function showLiveProgress() {
  $('results-scroll').innerHTML = `
    <div id="live-progress" style="padding: 8px 0">
      <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:8px">
        <span id="progress-label">Sending ${loadedCVs.length.toLocaleString()} CVs to Claude...</span>
        <span id="progress-pct">0%</span>
      </div>
      <div style="height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-bottom:16px">
        <div id="progress-fill" style="height:100%;background:var(--accent);border-radius:2px;width:5%;transition:width 0.4s ease"></div>
      </div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--faint);line-height:1.8">
        <div id="step-1" style="color:var(--accent)">▶ Reading all CVs from sheet...</div>
        <div id="step-2" style="color:var(--faint)">○ Analyzing candidates against job description...</div>
        <div id="step-3" style="color:var(--faint)">○ Ranking top ${topN} matches...</div>
        <div id="step-4" style="color:var(--faint)">○ Preparing results...</div>
      </div>
      <div style="margin-top:16px;font-family:var(--mono);font-size:10px;color:var(--faint)" id="stream-preview"></div>
    </div>`;
}

function updateLiveProgress(tokenCount, fullText) {
  const fill = $('progress-fill');
  const pct  = $('progress-pct');
  const label = $('progress-label');
  const preview = $('stream-preview');
  if (!fill) return;

  const p = Math.min(90, 5 + tokenCount * 0.3);
  fill.style.width = p + '%';
  pct.textContent  = Math.round(p) + '%';

  if (tokenCount > 5) {
    $('step-1').style.color = 'var(--green)';
    $('step-1').textContent = '✓ CVs loaded';
    $('step-2').style.color = 'var(--accent)';
    $('step-2').textContent = '▶ Analyzing candidates...';
  }
  if (tokenCount > 80) {
    $('step-2').style.color = 'var(--green)';
    $('step-2').textContent = '✓ Analysis complete';
    $('step-3').style.color = 'var(--accent)';
    $('step-3').textContent = '▶ Ranking top ' + topN + ' matches...';
  }
  if (tokenCount > 200) {
    $('step-3').style.color = 'var(--green)';
    $('step-3').textContent = '✓ Ranking done';
    $('step-4').style.color = 'var(--accent)';
    $('step-4').textContent = '▶ Preparing results...';
    label.textContent = 'Almost done...';
  }

  const lastChunk = fullText.slice(-120).replace(/[^\w\s.,]/g, '');
  if (preview) preview.textContent = lastChunk;
}

function setLoading(on) {
  $('run-btn').disabled        = on;
  $('spinner').style.display   = on ? 'block' : 'none';
  $('run-icon').style.display  = on ? 'none'  : 'block';
  $('status-pill').textContent = on ? 'running' : 'idle';
  $('status-pill').className   = 'pill' + (on ? ' live' : '');
}

function showError(msg) {
  $('progress-wrap').classList.remove('visible');
  $('empty-state').style.display = 'none';
  $('results-scroll').innerHTML  = `<div class="error-box">Error: ${esc(msg)}</div>`;
  $('results-meta').textContent  = 'error';
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
